<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUDS Tracker</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React and ReactDOM CDNs (Must be loaded first) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Prop-Types (Required by Recharts UMD) -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    
    <!-- Recharts (Loading a specific version compatible with React 18 UMD) -->
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    
    <!-- Babel for JSX transformation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            overscroll-behavior-y: contain;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            background: #4f46e5;
            cursor: pointer;
            border-radius: 50%;
            border: 4px solid white;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer } = Recharts;

        const App = () => {
            const [sudsValue, setSudsValue] = useState(50);
            const [logs, setLogs] = useState([]);
            const [note, setNote] = useState('');
            const [view, setView] = useState('entry');
            const getMonthKey = (timestamp) => {
                const date = new Date(timestamp);
                return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
            };

            const getMonthLabel = (monthKey) => {
                const [year, month] = monthKey.split('-').map(Number);
                return new Date(year, month - 1, 1).toLocaleDateString(undefined, {
                    month: 'long',
                    year: 'numeric'
                });
            };

            const [selectedMonth, setSelectedMonth] = useState(getMonthKey(new Date().toISOString()));

            // Initialize Lucide icons on every render/view change
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            });

            useEffect(() => {
                const savedLogs = localStorage.getItem('suds_logs');
                if (savedLogs) {
                    try {
                        setLogs(JSON.parse(savedLogs));
                    } catch (e) {
                        console.error("Failed to load logs", e);
                    }
                }
            }, []);

            useEffect(() => {
                localStorage.setItem('suds_logs', JSON.stringify(logs));
            }, [logs]);

            const handleSubmit = (e) => {
                e.preventDefault();
                const newEntry = {
                    id: Date.now(),
                    value: parseInt(sudsValue),
                    timestamp: new Date().toISOString(),
                    note: note.trim()
                };
                setLogs([newEntry, ...logs]);
                setNote('');
                setSudsValue(50);
            };

            const deleteEntry = (id) => {
                // Using a non-blocking confirmation would be better, but standard confirm is used here
                if (window.confirm('Delete this entry?')) {
                    setLogs(logs.filter(log => log.id !== id));
                }
            };

            const getSudsColor = (val) => {
                if (val < 30) return 'text-emerald-500';
                if (val < 60) return 'text-amber-500';
                if (val < 85) return 'text-orange-500';
                return 'text-rose-500';
            };

            const getSudsBg = (val) => {
                if (val < 30) return 'bg-emerald-50 border-emerald-100';
                if (val < 60) return 'bg-amber-50 border-amber-100';
                if (val < 85) return 'bg-orange-50 border-orange-100';
                return 'bg-rose-50 border-rose-100';
            };

            const getCalmingExercise = (val) => {
                if (val <= 20) {
                    return {
                        title: 'Three-Point Touch',
                        range: 'SUDS 1-20',
                        intro: "Since your distress is low, let's anchor this calm.",
                        steps: [
                            { text: 'Notice three specific places where your body meets your chair or the floor.', duration: 20 },
                            { text: 'Feel the solid support beneath you.', duration: 20 },
                            { text: 'Silently tell yourself: "I am steady, I am safe, and I am present in this moment."', duration: 15 }
                        ]
                    };
                }

                if (val <= 40) {
                    return {
                        title: '3-3-3 Rule',
                        range: 'SUDS 21-40',
                        intro: 'This technique shifts your focus from internal distress back to your physical environment.',
                        steps: [
                            { text: 'Name three things you see.', duration: 20 },
                            { text: 'Name three sounds you hear.', duration: 20 },
                            { text: 'Move three parts of your body, like your ankles, fingers, or shoulders.', duration: 20 },
                            { text: 'Remind yourself: "I am safe, and this feeling is temporary."', duration: 15 }
                        ]
                    };
                }

                if (val <= 60) {
                    return {
                        title: 'Box Breathing',
                        range: 'SUDS 41-60',
                        intro: 'This technique physically signals your nervous system to calm down.',
                        steps: [
                            { text: 'Inhale slowly for 4 seconds.', duration: 4 },
                            { text: 'Hold for 4 seconds.', duration: 4 },
                            { text: 'Exhale for 4 seconds.', duration: 4 },
                            { text: 'Hold for 4 seconds.', duration: 4 },
                            {
                                text: 'Continue the guided box breathing cycle for three more rounds.',
                                duration: 52,
                                introText: 'Continue three more rounds.',
                                cycleTexts: [
                                    'Inhale slowly for 4 seconds.',
                                    'Hold for 4 seconds.',
                                    'Exhale for 4 seconds.',
                                    'Hold for 4 seconds.'
                                ]
                            },
                            { text: 'Remind yourself: "I am safe in this moment, and this feeling is temporary."', duration: 15 }
                        ]
                    };
                }

                if (val <= 80) {
                    return {
                        title: '5-4-3-2-1 Grounding',
                        range: 'SUDS 61-80',
                        intro: 'This pulls your brain away from the distress and back to the present.',
                        steps: [
                            { text: 'Identify 5 things you see.', duration: 25 },
                            { text: 'Identify 4 things you can touch.', duration: 20 },
                            { text: 'Identify 3 things you hear.', duration: 15 },
                            { text: 'Identify 2 things you smell.', duration: 15 },
                            { text: 'Identify 1 thing you taste.', duration: 10 },
                            { text: 'Remind yourself: "This is a physical reaction, and I am safe while it passes."', duration: 15 }
                        ]
                    };
                }

                return {
                    title: 'Cold Water Reset',
                    range: 'SUDS 81-100',
                    intro: 'This physical shock can trigger the mammalian dive reflex and help slow your heart rate.',
                    steps: [
                        { text: 'Splash ice-cold water on your face, submerge your face in cold water, or hold ice packs to your face for 30 seconds while holding your breath, if that feels safe for you.', duration: 30 },
                        { text: 'Take deep, slow breaths and focus entirely on the intense cold.', duration: 15 },
                        { text: 'Say to yourself: "I am safe in this moment, and this peak will pass."', duration: 15 },
                        { text: 'Continue with slow breathing or repeat the process.', duration: 20 }
                    ]
                };
            };

            const availableMonths = useMemo(() => {
                const uniqueMonths = [...new Set(logs.map((log) => getMonthKey(log.timestamp)))];

                if (uniqueMonths.length === 0) {
                    return [getMonthKey(new Date().toISOString())];
                }

                return uniqueMonths.sort((a, b) => b.localeCompare(a));
            }, [logs]);

            useEffect(() => {
                if (!availableMonths.includes(selectedMonth)) {
                    setSelectedMonth(availableMonths[0]);
                }
            }, [availableMonths, selectedMonth]);

            const selectedMonthLogs = useMemo(() => {
                return logs.filter((log) => getMonthKey(log.timestamp) === selectedMonth);
            }, [logs, selectedMonth]);

            const chartData = useMemo(() => {
                return [...selectedMonthLogs]
                    .sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp))
                    .map((log) => ({
                        time: new Date(log.timestamp).toLocaleDateString(undefined, {
                            month: 'short',
                            day: 'numeric'
                        }),
                        fullTime: new Date(log.timestamp).toLocaleString([], {
                            month: 'short',
                            day: 'numeric',
                            hour: '2-digit',
                            minute: '2-digit'
                        }),
                        value: log.value
                    }));
            }, [selectedMonthLogs]);

            const stats = useMemo(() => {
                if (logs.length === 0) return { avg: 0, peak: 0, count: 0 };
                const sum = logs.reduce((a, b) => a + b.value, 0);
                const peak = Math.max(...logs.map(l => l.value));
                return {
                    avg: Math.round(sum / logs.length),
                    peak,
                    count: logs.length
                };
            }, [logs]);

            const monthStats = useMemo(() => {
                if (selectedMonthLogs.length === 0) return { avg: 0, peak: 0, count: 0 };
                const sum = selectedMonthLogs.reduce((a, b) => a + b.value, 0);
                const peak = Math.max(...selectedMonthLogs.map((log) => log.value));
                return {
                    avg: Math.round(sum / selectedMonthLogs.length),
                    peak,
                    count: selectedMonthLogs.length
                };
            }, [selectedMonthLogs]);

            const groupedMonthLogs = useMemo(() => {
                return selectedMonthLogs.reduce((groups, log) => {
                    const dayKey = new Date(log.timestamp).toLocaleDateString(undefined, {
                        weekday: 'short',
                        month: 'short',
                        day: 'numeric'
                    });

                    if (!groups[dayKey]) {
                        groups[dayKey] = [];
                    }

                    groups[dayKey].push(log);
                    return groups;
                }, {});
            }, [selectedMonthLogs]);

            const calmingExercise = useMemo(() => getCalmingExercise(Number(sudsValue)), [sudsValue]);
            const [currentStepIndex, setCurrentStepIndex] = useState(0);
            const [timeLeft, setTimeLeft] = useState(calmingExercise.steps[0].duration);
            const [isTimerRunning, setIsTimerRunning] = useState(false);

            useEffect(() => {
                setCurrentStepIndex(0);
                setTimeLeft(calmingExercise.steps[0].duration);
                setIsTimerRunning(false);
            }, [calmingExercise, view]);

            useEffect(() => {
                if (view !== 'exercise' || !isTimerRunning) return;

                if (timeLeft <= 0) {
                    if (currentStepIndex < calmingExercise.steps.length - 1) {
                        const nextIndex = currentStepIndex + 1;
                        setCurrentStepIndex(nextIndex);
                        setTimeLeft(calmingExercise.steps[nextIndex].duration);
                    } else {
                        setIsTimerRunning(false);
                    }
                    return;
                }

                const timer = window.setTimeout(() => {
                    setTimeLeft((prev) => prev - 1);
                }, 1000);

                return () => window.clearTimeout(timer);
            }, [timeLeft, isTimerRunning, currentStepIndex, calmingExercise, view]);

            const currentStep = calmingExercise.steps[currentStepIndex];
            const totalSteps = calmingExercise.steps.length;
            const currentStepText = useMemo(() => {
                if (!currentStep.cycleTexts || currentStep.cycleTexts.length === 0) {
                    return currentStep.text;
                }

                if (currentStep.introText && timeLeft > currentStep.duration - 4) {
                    return currentStep.introText;
                }

                const elapsed = currentStep.duration - timeLeft;
                const cycleElapsed = currentStep.introText ? Math.max(0, elapsed - 4) : elapsed;
                const cycleIndex = Math.min(
                    currentStep.cycleTexts.length - 1,
                    Math.floor(cycleElapsed / 4) % currentStep.cycleTexts.length
                );

                return currentStep.cycleTexts[cycleIndex];
            }, [currentStep, timeLeft]);

            const resetExercise = () => {
                setCurrentStepIndex(0);
                setTimeLeft(calmingExercise.steps[0].duration);
                setIsTimerRunning(false);
            };

            const goToNextStep = () => {
                if (currentStepIndex < totalSteps - 1) {
                    const nextIndex = currentStepIndex + 1;
                    setCurrentStepIndex(nextIndex);
                    setTimeLeft(calmingExercise.steps[nextIndex].duration);
                } else {
                    setIsTimerRunning(false);
                }
            };

            const goToPreviousStep = () => {
                if (currentStepIndex > 0) {
                    const prevIndex = currentStepIndex - 1;
                    setCurrentStepIndex(prevIndex);
                    setTimeLeft(calmingExercise.steps[prevIndex].duration);
                    setIsTimerRunning(false);
                }
            };

            return (
                <div className="min-h-screen flex flex-col max-w-md mx-auto bg-white shadow-xl min-h-[100dvh]">
                    <header className="bg-white border-b sticky top-0 z-10 px-6 py-4 flex justify-between items-center">
                        <div className="flex items-center gap-2">
                            <div className="bg-indigo-600 p-1.5 rounded-lg text-white">
                                <i data-lucide="trending-up" className="w-5 h-5"></i>
                            </div>
                            <h1 className="text-xl font-extrabold tracking-tight">SUDS</h1>
                        </div>
                        <div className="flex bg-slate-100 rounded-xl p-1">
                            <button 
                                onClick={() => setView('entry')} 
                                className={`px-4 py-1.5 rounded-lg text-xs font-bold uppercase tracking-wider transition-all ${view === 'entry' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500'}`}
                            >
                                Log
                            </button>
                            <button 
                                onClick={() => setView('history')} 
                                className={`px-4 py-1.5 rounded-lg text-xs font-bold uppercase tracking-wider transition-all ${view === 'history' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500'}`}
                            >
                                History
                            </button>
                        </div>
                    </header>

                    <main className={`flex-1 overflow-y-auto custom-scrollbar p-6 ${logs.length > 0 ? 'pb-40' : ''}`}>
                        {view === 'entry' ? (
                            <div className="space-y-8 animate-in fade-in duration-500">
                                <div className={`p-10 rounded-[2.5rem] border-2 text-center transition-all duration-500 ${getSudsBg(sudsValue)}`}>
                                    <p className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-4">Current Distress</p>
                                    <div className={`text-8xl font-black mb-4 tabular-nums ${getSudsColor(sudsValue)}`}>{sudsValue}</div>
                                    <p className="font-bold text-slate-700 text-lg">
                                        {sudsValue <= 20 && "Calm / Relaxed"}
                                        {sudsValue > 20 && sudsValue <= 40 && "Mildly anxious"}
                                        {sudsValue > 40 && sudsValue <= 60 && "Uncomfortable"}
                                        {sudsValue > 60 && sudsValue <= 80 && "High Distress"}
                                        {sudsValue > 80 && "Extreme / Panic"}
                                    </p>
                                </div>

                                <button
                                    type="button"
                                    onClick={() => setView('exercise')}
                                    className="w-full py-4 px-5 bg-slate-900 text-white rounded-[2rem] font-black text-sm uppercase tracking-widest shadow-xl shadow-slate-200 active:scale-95 transition-transform flex items-center justify-center gap-3"
                                >
                                    <i data-lucide="heart" className="w-5 h-5"></i>
                                    Show Calming Exercise
                                </button>

                                <form onSubmit={handleSubmit} className="space-y-8">
                                    <div className="space-y-4">
                                        <input 
                                            type="range" 
                                            min="0" 
                                            max="100" 
                                            value={sudsValue} 
                                            onChange={(e) => setSudsValue(e.target.value)} 
                                            className="w-full h-3 bg-slate-100 rounded-lg appearance-none cursor-pointer accent-indigo-600 border border-slate-200" 
                                        />
                                        <div className="flex justify-between text-[10px] font-black text-slate-400 px-1 uppercase tracking-tighter">
                                            <span>0 (Calm)</span>
                                            <span>50</span>
                                            <span>100 (Peak)</span>
                                        </div>
                                    </div>

                                    <div className="space-y-3">
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Context / Notes</label>
                                        <textarea 
                                            value={note} 
                                            onChange={(e) => setNote(e.target.value)} 
                                            placeholder="What is happening right now?" 
                                            className="w-full p-5 bg-slate-50 border border-slate-200 rounded-3xl focus:ring-4 focus:ring-indigo-50 outline-none transition-all resize-none h-32 text-sm placeholder:text-slate-300" 
                                        />
                                    </div>

                                    <button 
                                        type="submit" 
                                        className="w-full py-5 bg-indigo-600 text-white rounded-[2rem] font-black text-sm uppercase tracking-widest shadow-xl shadow-indigo-100 active:scale-95 transition-transform flex items-center justify-center gap-3"
                                    >
                                        <i data-lucide="plus-circle" className="w-5 h-5"></i>
                                        Log Entry
                                    </button>
                                </form>
                            </div>
                        ) : view === 'history' ? (
                            <div className="space-y-8 animate-in slide-in-from-right-4 duration-300">
                                <div className="bg-white p-4 rounded-[2rem] border border-slate-100 shadow-sm">
                                    <div className="flex items-center justify-between gap-3">
                                        <button
                                            type="button"
                                            onClick={() => {
                                                const currentIndex = availableMonths.indexOf(selectedMonth);
                                                if (currentIndex < availableMonths.length - 1) {
                                                    setSelectedMonth(availableMonths[currentIndex + 1]);
                                                }
                                            }}
                                            disabled={availableMonths.indexOf(selectedMonth) === availableMonths.length - 1}
                                            className="w-11 h-11 rounded-2xl border border-slate-200 text-slate-600 flex items-center justify-center disabled:opacity-40 disabled:cursor-not-allowed"
                                        >
                                            <i data-lucide="chevron-left" className="w-5 h-5"></i>
                                        </button>
                                        <div className="text-center">
                                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Viewing Month</p>
                                            <p className="text-lg font-black text-slate-900 mt-1">{getMonthLabel(selectedMonth)}</p>
                                        </div>
                                        <button
                                            type="button"
                                            onClick={() => {
                                                const currentIndex = availableMonths.indexOf(selectedMonth);
                                                if (currentIndex > 0) {
                                                    setSelectedMonth(availableMonths[currentIndex - 1]);
                                                }
                                            }}
                                            disabled={availableMonths.indexOf(selectedMonth) === 0}
                                            className="w-11 h-11 rounded-2xl border border-slate-200 text-slate-600 flex items-center justify-center disabled:opacity-40 disabled:cursor-not-allowed"
                                        >
                                            <i data-lucide="chevron-right" className="w-5 h-5"></i>
                                        </button>
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm h-64">
                                    <div className="flex justify-between items-center mb-6">
                                        <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Trend Map</h3>
                                        <i data-lucide="activity" className="w-4 h-4 text-slate-300"></i>
                                    </div>
                                    <div className="h-40 w-full">
                                        {selectedMonthLogs.length > 1 ? (
                                            <ResponsiveContainer width="100%" height="100%">
                                                <LineChart data={chartData}>
                                                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                                    <XAxis dataKey="time" tickLine={false} axisLine={false} tick={{ fontSize: 10, fill: '#94a3b8' }} />
                                                    <YAxis domain={[0, 100]} hide />
                                                    <Tooltip 
                                                        contentStyle={{borderRadius: '16px', border: 'none', boxShadow: '0 10px 15px -3px rgb(0 0 0 / 0.1)', fontSize: '12px'}}
                                                        labelFormatter={(label, payload) => payload?.[0]?.payload?.fullTime || label}
                                                    />
                                                    <Line 
                                                        type="monotone" 
                                                        dataKey="value" 
                                                        stroke="#4f46e5" 
                                                        strokeWidth={4} 
                                                        dot={{ fill: '#4f46e5', r: 4, strokeWidth: 2, stroke: '#fff' }} 
                                                        activeDot={{ r: 6, strokeWidth: 0 }}
                                                    />
                                                </LineChart>
                                            </ResponsiveContainer>
                                        ) : (
                                            <div className="h-full flex items-center justify-center text-slate-300 text-[10px] font-black uppercase italic tracking-widest">
                                                {selectedMonthLogs.length === 0 ? 'No entries this month' : 'Log more this month for a trend line'}
                                            </div>
                                        )}
                                    </div>
                                </div>

                                <div className="space-y-4 pb-24">
                                    <div className="flex justify-between items-center px-2">
                                        <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest">History</h3>
                                        <span className="text-[10px] font-black bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full">{monthStats.count} This Month</span>
                                    </div>
                                    {selectedMonthLogs.length === 0 ? (
                                        <div className="bg-slate-50 border border-slate-200 rounded-[2rem] p-8 text-center">
                                            <p className="text-sm font-bold text-slate-500">No entries for {getMonthLabel(selectedMonth)} yet.</p>
                                        </div>
                                    ) : (
                                        Object.entries(groupedMonthLogs).map(([dayLabel, dayLogs]) => (
                                            <div key={dayLabel} className="space-y-3">
                                                <div className="px-2">
                                                    <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest">{dayLabel}</h4>
                                                </div>
                                                {dayLogs.map(log => (
                                                    <div key={log.id} className="bg-white p-5 rounded-[2rem] border border-slate-100 flex gap-5 shadow-sm group">
                                                        <div className={`w-14 h-14 rounded-2xl flex items-center justify-center font-black text-xl shrink-0 shadow-inner ${getSudsBg(log.value)} ${getSudsColor(log.value)}`}>
                                                            {log.value}
                                                        </div>
                                                        <div className="flex-1 min-w-0">
                                                            <div className="flex justify-between items-start">
                                                                <div>
                                                                    <p className="text-[10px] font-black text-slate-400 uppercase tracking-tight">Logged At</p>
                                                                    <p className="text-sm font-bold text-slate-800">
                                                                        {new Date(log.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
                                                                    </p>
                                                                </div>
                                                                <button 
                                                                    onClick={() => deleteEntry(log.id)} 
                                                                    className="text-slate-200 hover:text-rose-500 p-2 transition-colors"
                                                                >
                                                                    <i data-lucide="trash-2" className="w-4 h-4"></i>
                                                                </button>
                                                            </div>
                                                            {log.note && (
                                                                <p className="mt-3 text-sm text-slate-600 leading-relaxed bg-slate-50 p-4 rounded-2xl border border-slate-50 italic">
                                                                    "{log.note}"
                                                                </p>
                                                            )}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        ))
                                    )}
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-6 animate-in fade-in duration-300">
                                <div className={`p-8 rounded-[2.5rem] border-2 ${getSudsBg(sudsValue)}`}>
                                    <div className="flex items-start justify-between gap-4 mb-6">
                                        <div>
                                            <p className="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-2">Recommended Support</p>
                                            <h2 className="text-3xl font-black text-slate-900">{calmingExercise.title}</h2>
                                            <p className="text-sm font-bold text-slate-500 mt-2">{calmingExercise.range}</p>
                                        </div>
                                        <div className={`w-16 h-16 rounded-3xl flex items-center justify-center text-2xl font-black shadow-inner ${getSudsBg(sudsValue)} ${getSudsColor(sudsValue)}`}>
                                            {sudsValue}
                                        </div>
                                    </div>

                                    <p className="text-base text-slate-700 leading-relaxed mb-6">
                                        {calmingExercise.intro}
                                    </p>

                                    <div className="bg-white/70 rounded-[2rem] border border-white/80 p-5 mb-5">
                                        <div className="flex items-center justify-between gap-4 mb-4">
                                            <div>
                                                <p className="text-[10px] font-black uppercase tracking-widest text-slate-400">Current Step</p>
                                                <p className="text-lg font-black text-slate-900 mt-1">
                                                    {currentStepIndex + 1} of {totalSteps}
                                                </p>
                                            </div>
                                            <div className="text-right">
                                                <p className="text-[10px] font-black uppercase tracking-widest text-slate-400">Timer</p>
                                                <p className="text-3xl font-black text-slate-900 tabular-nums mt-1">
                                                    {String(Math.floor(timeLeft / 60)).padStart(2, '0')}:{String(timeLeft % 60).padStart(2, '0')}
                                                </p>
                                            </div>
                                        </div>

                                        <div className="w-full h-2 rounded-full bg-white mb-5 overflow-hidden">
                                            <div
                                                className="h-full bg-slate-900 transition-all duration-300"
                                                style={{ width: `${((currentStepIndex + 1) / totalSteps) * 100}%` }}
                                            />
                                        </div>

                                        <div className="flex gap-3 items-start bg-white rounded-2xl border border-slate-100 px-4 py-4">
                                            <div className="w-8 h-8 rounded-full bg-slate-900 text-white text-xs font-black flex items-center justify-center shrink-0">
                                                {currentStepIndex + 1}
                                            </div>
                                            <p className="text-base text-slate-700 leading-relaxed">{currentStepText}</p>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-3 mb-5">
                                        <button
                                            type="button"
                                            onClick={() => setIsTimerRunning((prev) => !prev)}
                                            className="py-4 px-4 bg-slate-900 text-white rounded-2xl font-black text-xs uppercase tracking-widest flex items-center justify-center gap-2"
                                        >
                                            <i data-lucide={isTimerRunning ? "pause" : "play"} className="w-4 h-4"></i>
                                            {isTimerRunning ? 'Pause' : 'Start'}
                                        </button>
                                        <button
                                            type="button"
                                            onClick={resetExercise}
                                            className="py-4 px-4 bg-white border border-slate-200 text-slate-700 rounded-2xl font-black text-xs uppercase tracking-widest flex items-center justify-center gap-2"
                                        >
                                            <i data-lucide="rotate-ccw" className="w-4 h-4"></i>
                                            Restart
                                        </button>
                                        <button
                                            type="button"
                                            onClick={goToPreviousStep}
                                            disabled={currentStepIndex === 0}
                                            className="py-4 px-4 bg-white border border-slate-200 text-slate-700 rounded-2xl font-black text-xs uppercase tracking-widest flex items-center justify-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed"
                                        >
                                            <i data-lucide="chevron-left" className="w-4 h-4"></i>
                                            Previous
                                        </button>
                                        <button
                                            type="button"
                                            onClick={goToNextStep}
                                            className="py-4 px-4 bg-white border border-slate-200 text-slate-700 rounded-2xl font-black text-xs uppercase tracking-widest flex items-center justify-center gap-2"
                                        >
                                            <i data-lucide="chevron-right" className="w-4 h-4"></i>
                                            {currentStepIndex === totalSteps - 1 ? 'Finish' : 'Next'}
                                        </button>
                                    </div>

                                    <div className="space-y-3">
                                        {calmingExercise.steps.map((step, index) => (
                                            <div
                                                key={index}
                                                className={`flex gap-3 items-start rounded-2xl border px-4 py-4 transition-all ${
                                                    index === currentStepIndex
                                                        ? 'bg-white border-slate-200 shadow-sm'
                                                        : 'bg-white/40 border-white/60'
                                                }`}
                                            >
                                                <div className={`w-7 h-7 rounded-full text-xs font-black flex items-center justify-center shrink-0 ${
                                                    index === currentStepIndex ? 'bg-slate-900 text-white' : 'bg-white text-slate-500'
                                                }`}>
                                                    {index + 1}
                                                </div>
                                                <div className="flex-1">
                                                    <p className="text-sm text-slate-700 leading-relaxed">{step.text}</p>
                                                    <p className="text-[10px] font-black uppercase tracking-widest text-slate-400 mt-2">
                                                        {step.duration} sec
                                                    </p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                <button
                                    type="button"
                                    onClick={() => setView('entry')}
                                    className="w-full py-4 px-5 bg-white border border-slate-200 text-slate-700 rounded-[2rem] font-black text-sm uppercase tracking-widest active:scale-95 transition-transform flex items-center justify-center gap-3"
                                >
                                    <i data-lucide="arrow-left" className="w-5 h-5"></i>
                                    Back To Tracker
                                </button>
                            </div>
                        )}
                    </main>

                    {logs.length > 0 && (
                        <footer className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[calc(100%-3rem)] max-w-[calc(448px-3rem)] bg-slate-900/95 backdrop-blur-md text-white rounded-[2.5rem] p-6 flex justify-around items-center shadow-2xl border border-white/10 z-20">
                            <div className="text-center">
                                <p className="text-[9px] uppercase opacity-40 font-black tracking-widest mb-1">{view === 'history' ? 'Month Avg' : 'Average'}</p>
                                <p className="text-xl font-black tabular-nums">{view === 'history' ? monthStats.avg : stats.avg}</p>
                            </div>
                            <div className="w-px h-8 bg-white/10" />
                            <div className="text-center">
                                <p className="text-[9px] uppercase opacity-40 font-black tracking-widest mb-1">{view === 'history' ? 'Month Peak' : 'Peak'}</p>
                                <p className="text-xl font-black tabular-nums text-rose-400">{view === 'history' ? monthStats.peak : stats.peak}</p>
                            </div>
                        </footer>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
